name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
  merge_group:

env:
  CARGO_TERM_COLOR: always
  # CI never debugs interactively, so drop most debuginfo to cut compile + link time. Keep line
  # tables so panic / test-failure backtraces still report file:line.
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only

concurrency:
  group: ${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  format:
    name: format
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install prek
        run: cargo install prek --version 0.4.4 --locked
      - name: Check copyright
        run: prek run copyright --all-files
      - name: Check typos
        run: prek run typos --all-files
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: Install nightly toolchain for rustfmt
        run: rustup toolchain install nightly-2026-01-01 --component rustfmt
      - name: Check rustfmt
        run: prek run rustfmt --all-files

  rust-checks:
    strategy:
      fail-fast: false
      matrix:
        arch:
          # binius-circuits tests are architecture-independent (the crate depends only on
          # binius-frontend + binius-core, which contain no arch-specific code), so they run only on
          # the x86_64 leg. The other legs skip them with nextest's run-layer filter (`-E`) rather
          # than `cargo --exclude`: keeping the build set at `--workspace` matches the Compile step's
          # feature unification, so the dependency tree is not recompiled. See BINIUS-151.
          - name: x86_64-portable
            runner: ubuntu-24.04
            rustflags: # portable
            test_args: "-E 'not package(binius-circuits)'"
          - name: x86_64
            runner: ubuntu-24.04
            rustflags: "-Ctarget-cpu=native"
            test_args: ""
          - name: arm64
            runner: ubuntu-24.04-arm
            rustflags: "-Ctarget-cpu=native"
            test_args: "-E 'not package(binius-circuits)'"
    name: rust-checks-${{ matrix.arch.name }}
    runs-on: ${{ matrix.arch.runner }}
    env:
      # Link with lld instead of the default ld.bfd: the rust-checks build links many test and
      # example binaries, where bfd is a serial bottleneck. Appended to the per-arch flags
      # (target-cpu). lld is installed below.
      RUSTFLAGS: "${{ matrix.arch.rustflags }} -Clink-arg=-fuse-ld=lld"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      # GitHub-hosted x86_64 runners include both Intel (with AVX-512/GFNI) and
      # AMD (without) SKUs. With `-Ctarget-cpu=native`, build artifacts cached
      # on one SKU produce illegal instructions when restored on another.
      # Hash the CPU feature set into the cache key so heterogeneous runners do
      # not share artifacts. Skipped for portable builds (CPU-agnostic output).
      - name: Compute CPU feature cache key
        if: matrix.arch.rustflags != ''
        id: cpu
        run: |
          if [ -r /proc/cpuinfo ]; then
            HASH=$(grep -m1 -E '^(flags|Features)[[:space:]]*:' /proc/cpuinfo | sha256sum | cut -c1-16)
          else
            HASH=portable
          fi
          echo "key=cpu-${HASH}" >> "$GITHUB_OUTPUT"
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          cache-key: ${{ steps.cpu.outputs.key }}
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Install lld
        run: sudo apt-get update -qq && sudo apt-get install -y lld
      # Don't *build* benchmarks: each criterion bench is a separate binary linking the whole crate,
      # and CI never runs them (`cargo bench`), so codegen + linking them is pure overhead. Clippy
      # below still checks them via `--all-targets` — that's front-end only (no codegen/link), so it
      # guards against bench bitrot (API drift) for a fraction of a full build.
      - name: Compile
        run: cargo build --workspace --lib --bins --tests --examples
      - name: Run platform diagnostics
        run: cargo test -p binius-utils --features platform-diagnostics test_platform_diagnostics -- --nocapture
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run tests
        run: cargo nextest run --workspace --no-fail-fast ${{ matrix.arch.test_args }}
      # Must run doctests separately, see https://github.com/nextest-rs/nextest/issues/16
      - name: Run doctests
        run: cargo test --doc --workspace

  # Build against wasm32-unknown-unknown target to test that our libraries compile to wasm.
  wasm-vanilla-build:
    name: wasm-vanilla-build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
      - name: Compile vanilla wasm32
        run: cargo build -p binius-field --target wasm32-unknown-unknown

  wasm-tests:
    name: wasm-tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-wasip1
      - name: Set up Wasmer
        uses: wasmerio/setup-wasmer@v2
        with:
          version: 'v6.0.1'
      - name: Test on wasm32-wasip1
        run: cargo test -p binius-math -p binius-field -p binius-prover -p binius-verifier --target wasm32-wasip1 --config "target.wasm32-wasip1.runner=['wasmer']"

  rust-doc:
    name: rust-doc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build documentation (including private items for CI checks)
        run: cargo doc --document-private-items --no-deps
        env:
          # Promote rustdoc lints (broken intra-doc links, missing crate-level
          # docs) to errors, matching the `rustdoc` pre-push hook in prek.toml.
          RUSTDOCFLAGS: "-D warnings"

  circuits-snapshot:
    name: circuits-snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      # One job instead of a 9-way matrix: the examples share the same `binius-examples` crate, so
      # a matrix recompiled that whole tree (which links the prover + verifier) nine times for a
      # stats-only check. Building once and running each snapshot in turn keeps the work but cuts
      # ~8 redundant compiles. See BINIUS-151.
      - name: Check circuit statistics snapshots
        run: |
          set -e
          for example in ethsign zklogin sha256 sha512 keccak blake2s blake3_compress hashsign ec_msm; do
            echo "::group::${example}"
            cargo run --example "${example}" -- check-snapshot
            echo "::endgroup::"
          done
